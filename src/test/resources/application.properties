# Test profile: the context smoke test must load without external infrastructure.
# Exclude auto-configurations that open connections to Postgres/Redis/RabbitMQ so
# the application context wiring can be verified in isolation (infra beans are mocked).
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

spring.flyway.enabled=false

location.live.ttl-seconds=300
location.storage.routine-ttl-hours=12
location.flush.delay-ms=900000
location.purge.delay-ms=3600000
location.encryption.secret=test-secret
