spring.application.name=location
server.port=8089

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/location_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# Redis (live, ephemeral location snapshots)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# RabbitMQ
# CAMBIO: en AWS, Amazon MQ entrega una unica URI amqps://host:5671 en
# SPRING_RABBITMQ_ADDRESSES (Secrets Manager: patricia-dev/amazon-mq), no un
# host y puerto sueltos. spring.rabbitmq.addresses soporta el esquema amqps://
# y activa TLS solo, exactamente igual que en Parches/Auth/Users. En local
# (docker-compose) sigue funcionando con el default de abajo.
spring.rabbitmq.addresses=${SPRING_RABBITMQ_ADDRESSES:amqp://guest:guest@localhost:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# Actuator - requerido por los startup/readiness/liveness probes del Deployment
# de k8s (deploy/templates/deployment.yaml) y por el smoke test del CD
# (.github/workflows/CI.yml). Requiere agregar spring-boot-starter-actuator
# al pom.xml (ver pom.xml.patch.txt).
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# --- Location domain config ---
# Live position retention in Redis (seconds). Stale users drop off the live map.
location.live.ttl-seconds=${LOCATION_LIVE_TTL_SECONDS:300}
# How long routine (non-incident) flushed rows survive in the DB (Ley 1581: 12h).
location.storage.routine-ttl-hours=${LOCATION_ROUTINE_TTL_HOURS:12}
# Flush cadence: snapshot Redis -> DB every 15 minutes.
location.flush.delay-ms=${LOCATION_FLUSH_DELAY_MS:900000}
# AES-256 secret. SHA-256 derives the 32-byte key from it.
# PROD: replace with a KMS/Vault-managed 256-bit key; custody of this key is what
# enforces "only ROLE_LEGAL_COMPLIANCE can decrypt".
location.encryption.secret=${LOCATION_ENCRYPTION_SECRET:dev-only-change-me-in-production}

# --- Socket backplane (Redis Cluster #2, compartido por los MS de sockets) ---
# Apagado por defecto: un pod no lo necesita. En despliegue multi-pod,
# BACKPLANE_ENABLED=true y BACKPLANE_REDIS_* apuntando al cluster de pub/sub
# (distinto al Redis de cache de arriba).
backplane.enabled=${BACKPLANE_ENABLED:false}
backplane.channel=${BACKPLANE_CHANNEL:patricia:backplane:location}
backplane.redis.host=${BACKPLANE_REDIS_HOST:localhost}
backplane.redis.port=${BACKPLANE_REDIS_PORT:6379}
backplane.redis.password=${BACKPLANE_REDIS_PASSWORD:}
