apiVersion: apps/v1
kind: Deployment
metadata:
  name: location
  namespace: patricia-app
  # patricia.io/sg-tier: socket (NO "standard"). Location esta en
  # var.socket_services (infra) y necesita ademas del SG eks_pods el SG
  # socket_ms_pods para alcanzar el backplane Redis (Cluster #2, Sec 4.1).
  #
  # El SecurityGroupPolicy "patricia-app-socket-pods" para esta label ya existe
  # en Ulink_Infra y esta confirmado via `kubectl get securitygrouppolicy -n
  # patricia-app` (2026-07-11) - ver nota en values.yaml. config.backplaneEnabled
  # =true es correcto. Unico cuidado: Fargate asigna los security groups del ENI
  # solo al crear el pod, asi que cualquier pod que ya estuviera corriendo ANTES
  # de que la policy se aplicara necesita un rollout restart para recogerla.
  labels: { app: location, patricia.io/sg-tier: socket }
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: { app: location }
  template:
    metadata:
      labels: { app: location, patricia.io/sg-tier: socket }
    spec:
      serviceAccountName: location
      containers:
        - name: location
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8089
          envFrom:
            - configMapRef: { name: location-config }
            - secretRef:    { name: location-secrets }
          # Sin SecurityConfig.java en este repo (no hay dependencia
          # spring-security), asi que /actuator/health/** no necesita el fix
          # de permitAll que si tuvo Auth - no hay filter chain que lo bloquee.
          #
          # spring-boot-starter-actuator ya esta en el pom.xml, asi que
          # /actuator/health y /actuator/health/liveness responden como
          # esperan los 3 probes de abajo.
          startupProbe:
            httpGet: { path: /actuator/health, port: 8089 }
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8089 }
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8089 }
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
