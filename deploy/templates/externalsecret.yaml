# Trae lo que Location necesita desde AWS Secrets Manager a un Secret nativo
# de k8s (location-secrets) que el Deployment monta via envFrom.
#
# amazon-mq es un blob JSON con SPRING_RABBITMQ_ADDRESSES/USERNAME/PASSWORD
# (una URI amqps://...:5671 completa, no host+port separados). El
# application.properties ACTUAL de Location lee RABBITMQ_HOST/PORT/USERNAME/
# PASSWORD por separado - hay que actualizarlo a spring.rabbitmq.addresses /
# spring.rabbitmq.username / spring.rabbitmq.password (mismo patron que
# Parches/Auth/Users ya aplicaron), o estas 3 variables no van a alimentar
# nada en runtime. Ver README de este PR para el diff exacto.
#
# cache-redis y backplane-redis SI coinciden exacto con lo que
# application.properties ya espera (REDIS_HOST/PORT/PASSWORD y
# BACKPLANE_REDIS_HOST/PORT/PASSWORD) - sin renombrar nada.
#
# location/postgres es Neon (Postgres serverless externo), no RDS, pero con
# la MISMA forma SPRING_DATASOURCE_URL/USERNAME/PASSWORD que application.properties
# ya usa - tampoco requiere renombrar.
#
# location/encryption: secreto que HOY NO EXISTE en Secrets Manager (no hay
# resource en modules/secrets de infra) - ver la nota larga en values.yaml.
# Mientras no se cree a mano, este ExternalSecret queda en SecretSyncError.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: location-secrets
  namespace: patricia-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: location-secrets
    creationPolicy: Owner
  data:
    - secretKey: SPRING_RABBITMQ_ADDRESSES
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_ADDRESSES }
    - secretKey: SPRING_RABBITMQ_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_USERNAME }
    - secretKey: SPRING_RABBITMQ_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_PASSWORD }
    - secretKey: REDIS_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_HOST }
    - secretKey: REDIS_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PORT }
    - secretKey: REDIS_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PASSWORD }
    - secretKey: BACKPLANE_REDIS_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_HOST }
    - secretKey: BACKPLANE_REDIS_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_PORT }
    - secretKey: BACKPLANE_REDIS_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_PASSWORD }
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/location/postgres", property: SPRING_DATASOURCE_URL }
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/location/postgres", property: SPRING_DATASOURCE_USERNAME }
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/location/postgres", property: SPRING_DATASOURCE_PASSWORD }
    - secretKey: LOCATION_ENCRYPTION_SECRET
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/location/encryption", property: LOCATION_ENCRYPTION_SECRET }
